<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Plant Kingdom — a living tree</title>
<style>
  :root{
    --ground:#0d1512; --ground-2:#101c17; --ink:#e9ede6; --dim:#93a396; --faint:#5f7167;
    --line:#2b3a32; --panel:#0f1a15cc; --edge:#25332c;
    --serif:'Iowan Old Style','Palatino Linotype','Palatino','Book Antiqua',Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --mono:ui-monospace,'SF Mono','SFMono-Regular',Menlo,monospace;
    /* lineage hues */
    --l-bryo:#8fce9f; --l-fern:#46b06a; --l-gymno:#35b8b0; --l-basal:#bf8ad4;
    --l-mono:#e3b24a; --l-rosid:#e67e6b; --l-asterid:#8f9be8; --l-eudicot:#ec9a4f;
    --l-root:#9fb0a4;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:
      radial-gradient(1200px 800px at 18% 8%, #14231c 0%, transparent 60%),
      radial-gradient(1000px 900px at 92% 100%, #101d18 0%, transparent 55%),
      var(--ground);
    color:var(--ink); font-family:var(--sans);
    display:flex; flex-direction:column; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- header ---------- */
  header.bar{
    display:flex; align-items:baseline; gap:24px; flex-wrap:wrap;
    padding:14px 22px 12px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0f1a1580,transparent);
    z-index:5;
  }
  .brand h1{
    font-family:var(--serif); font-weight:600; font-size:22px; letter-spacing:.2px;
    margin:0; line-height:1;
  }
  .brand h1 em{font-style:italic; color:var(--l-fern)}
  .brand p{margin:5px 0 0; font-size:12px; color:var(--dim); letter-spacing:.2px}
  .spacer{flex:1}
  .controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .search{position:relative}
  .search input{
    font-family:var(--sans); font-size:13px; color:var(--ink);
    background:#0c1712; border:1px solid var(--edge); border-radius:7px;
    padding:7px 30px 7px 11px; width:210px; outline:none; transition:border-color .15s,box-shadow .15s;
  }
  .search input::placeholder{color:var(--faint)}
  .search input:focus{border-color:var(--l-fern); box-shadow:0 0 0 3px #46b06a22}
  .search .hint{
    position:absolute; right:9px; top:50%; transform:translateY(-50%);
    font-family:var(--mono); font-size:10px; color:var(--faint); pointer-events:none;
  }
  button.ctl{
    font-family:var(--sans); font-size:12px; color:var(--dim);
    background:#0d1712; border:1px solid var(--edge); border-radius:7px;
    padding:7px 11px; cursor:pointer; transition:color .15s,border-color .15s,background .15s;
    white-space:nowrap;
  }
  button.ctl:hover{color:var(--ink); border-color:var(--faint)}
  button.ctl:focus-visible{outline:2px solid var(--l-fern); outline-offset:1px}
  button.ctl.on{color:var(--ground); background:var(--l-fern); border-color:var(--l-fern)}
  .seg{display:inline-flex; gap:5px; padding-right:9px; margin-right:3px; border-right:1px solid var(--line)}

  /* ---------- legend ---------- */
  .legend{
    display:flex; gap:16px; flex-wrap:wrap; align-items:center;
    padding:9px 22px; border-bottom:1px solid var(--line);
    font-size:11.5px; color:var(--dim); background:#0c1512aa; z-index:4;
  }
  .legend .lg{display:flex; align-items:center; gap:6px; cursor:default}
  .legend .dot{width:9px; height:9px; border-radius:50%; box-shadow:0 0 7px currentColor}
  .legend .sep{width:1px; height:13px; background:var(--line)}
  .legend .note{font-family:var(--mono); font-size:10.5px; color:var(--faint)}

  /* ---------- stage ---------- */
  main.stage{position:relative; flex:1; overflow:hidden; cursor:grab; touch-action:none}
  main.stage.grabbing{cursor:grabbing}
  svg{width:100%; height:100%; display:block}
  #viewport{will-change:transform}

  .link{fill:none; stroke:var(--lc,var(--line)); stroke-opacity:.34; stroke-width:1.4px;
    transition:stroke-opacity .2s, stroke-width .2s;}
  .node{cursor:pointer}
  .node .halo{fill:var(--lc); opacity:0; transition:opacity .2s}
  .node circle.dot{
    fill:var(--ground); stroke:var(--lc,var(--l-root)); stroke-width:1.8px;
    transition:transform .18s, fill .18s, stroke-width .18s;
  }
  .node.branch circle.dot{fill:var(--lc,var(--l-root))} /* collapsed w/ hidden children = filled */
  .node.open circle.dot{fill:var(--ground)}             /* expanded = hollow */
  .node text{
    font-family:var(--serif); font-size:12.5px; fill:var(--ink); paint-order:stroke;
    stroke:var(--ground); stroke-width:3px; stroke-linejoin:round;
    transition:fill .18s; dominant-baseline:middle;
  }
  .node text .rank{font-family:var(--mono)}
  .node text tspan.common{font-family:var(--sans); font-size:10px; fill:var(--dim)}
  .node text tspan.count{font-family:var(--mono); font-size:9.5px; fill:var(--faint)}
  .node .toggle{font-family:var(--mono); font-size:10px; fill:var(--ground); text-anchor:middle;
    stroke:none; pointer-events:none; dominant-baseline:central; font-weight:700}

  .node:hover circle.dot{stroke-width:2.6px}
  .node:hover text{fill:#fff}
  .node.kbfocus circle.dot{stroke:#fff; stroke-width:2.8px}
  .node.kbfocus .halo{opacity:.24}
  .node.kbfocus text{fill:#fff}
  main.stage:focus-visible{outline:2px solid var(--l-fern); outline-offset:-2px}

  /* focus/hover lineage highlight */
  .stage.focusing .link{stroke-opacity:.07}
  .stage.focusing .node{opacity:.28; transition:opacity .2s}
  .link.lit{stroke-opacity:.9 !important; stroke-width:2.4px}
  .node.lit{opacity:1 !important}
  .node.lit .halo{opacity:.18}

  /* search matches */
  .node.match circle.dot{stroke:#fff}
  .node.match .halo{opacity:.28}
  @keyframes pulse{0%,100%{opacity:.1}50%{opacity:.4}}
  .node.match .halo{animation:pulse 1.6s ease-in-out infinite}

  /* ---------- tooltip ---------- */
  .tip{
    position:absolute; pointer-events:none; z-index:9; opacity:0; transform:translateY(4px);
    transition:opacity .12s, transform .12s; max-width:300px;
    background:var(--panel); backdrop-filter:blur(8px);
    border:1px solid var(--edge); border-left-width:3px; border-radius:9px;
    padding:10px 13px; box-shadow:0 12px 34px #0009;
  }
  .tip.show{opacity:1; transform:translateY(0)}
  .tip .rk{font-family:var(--mono); font-size:9.5px; letter-spacing:1.4px; text-transform:uppercase; color:var(--dim)}
  .tip .nm{font-family:var(--serif); font-size:16px; margin:3px 0 1px}
  .tip .cm{font-size:12px; color:var(--dim); line-height:1.35}
  .tip .bl{font-size:12px; color:var(--ink); line-height:1.42; margin-top:8px; opacity:.92}
  .tip .ex{font-size:11.5px; color:var(--dim); line-height:1.4; margin-top:7px; font-family:var(--sans)}
  .tip .ex i{font-family:var(--mono); font-size:9px; color:var(--faint); text-transform:uppercase;
    letter-spacing:.6px; font-style:normal; margin-right:4px}
  .tip .st{margin-top:8px; padding-top:8px; border-top:1px solid var(--line);
    display:flex; gap:14px; font-family:var(--mono); font-size:11px; color:var(--ink)}
  .tip .st b{color:#fff; font-weight:600} .tip .st span{color:var(--faint)}

  /* ---------- footer ---------- */
  footer.meta{
    display:flex; gap:20px; flex-wrap:wrap; align-items:center;
    padding:8px 22px; border-top:1px solid var(--line); background:#0c1512aa;
    font-family:var(--mono); font-size:10.5px; color:var(--faint); z-index:4;
  }
  footer .k{color:var(--dim)} footer b{color:var(--ink); font-weight:600}

  .zoomctl{position:absolute; right:16px; bottom:16px; display:flex; flex-direction:column; gap:6px; z-index:6}
  .zoomctl button{width:32px; height:32px; font-size:16px; line-height:1; padding:0}

  /* ---------- detail panel ---------- */
  .panel{
    position:absolute; top:12px; right:12px; width:330px; max-width:calc(100% - 24px);
    max-height:calc(100% - 24px); overflow-y:auto; z-index:8;
    background:var(--panel); backdrop-filter:blur(10px);
    border:1px solid var(--edge); border-left:3px solid var(--l-root); border-radius:12px;
    padding:16px 18px 18px; box-shadow:0 18px 48px #000a;
    opacity:0; transform:translateX(12px); pointer-events:none;
    white-space:normal; overflow-wrap:break-word;
    transition:opacity .18s, transform .18s;
  }
  .panel.open{opacity:1; transform:none; pointer-events:auto}
  .pclose{position:absolute; top:10px; right:10px; width:26px; height:26px; border-radius:6px;
    background:transparent; border:1px solid var(--edge); color:var(--dim); cursor:pointer; font-size:15px; line-height:1}
  .pclose:hover{color:var(--ink); border-color:var(--faint)}
  .pcrumb{font-family:var(--mono); font-size:10px; color:var(--faint); line-height:1.7; margin-bottom:11px; padding-right:26px; overflow-wrap:break-word}
  .pcrumb a{color:var(--dim); cursor:pointer; text-decoration:none}
  .pcrumb a:hover{color:var(--ink); text-decoration:underline}
  .pcrumb .sepc{opacity:.5; margin:0 3px}
  .prank{display:inline-block; font-family:var(--mono); font-size:9px; letter-spacing:1.2px; text-transform:uppercase;
    color:var(--ground); background:var(--l-root); padding:2px 7px; border-radius:4px}
  .pname{font-family:var(--serif); font-size:23px; font-weight:600; margin:9px 0 2px; line-height:1.12}
  .pcommon{font-size:13px; color:var(--dim); margin-bottom:2px}
  .pblurb{font-size:13.5px; line-height:1.5; color:var(--ink); margin:11px 0 0; opacity:.94}
  .pexlabel{font-family:var(--mono); font-size:9px; letter-spacing:.8px; text-transform:uppercase; color:var(--faint); margin:14px 0 6px}
  .pex{display:flex; flex-wrap:wrap; gap:6px}
  .pex .exchip{font-family:var(--sans); font-size:11.5px; color:var(--dim);
    background:#0d1712; border:1px solid var(--edge); border-radius:20px; padding:3px 10px}
  .pstats{display:flex; gap:20px; margin-top:15px; padding-top:13px; border-top:1px solid var(--line)}
  .pstat{display:flex; flex-direction:column; gap:2px}
  .pstat b{font-family:var(--mono); font-size:16px; color:#fff; font-weight:600; font-variant-numeric:tabular-nums}
  .pstat span{font-size:9.5px; color:var(--faint); text-transform:uppercase; letter-spacing:.5px}
  .pactions{display:flex; gap:8px; margin-top:16px}
  #plist .lhead{font-family:var(--serif); font-size:19px; font-weight:600; margin:0 0 2px; padding-right:26px}
  #plist .lsub{font-family:var(--mono); font-size:9.5px; color:var(--faint); text-transform:uppercase; letter-spacing:.6px; margin-bottom:11px}
  .lrow{display:flex; align-items:center; gap:9px; padding:7px 7px; border-radius:7px; cursor:pointer; border:1px solid transparent}
  .lrow:hover{background:#0e1a14; border-color:var(--edge)}
  .lrow .ldot{width:8px; height:8px; border-radius:50%; flex:0 0 auto; box-shadow:0 0 6px currentColor}
  .lrow .ltx{min-width:0}
  .lrow .lname{font-family:var(--serif); font-size:13.5px; color:var(--ink)}
  .lrow .lcom{font-size:11px; color:var(--dim)}
  .lrow .lcount{margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums; flex:0 0 auto}

  /* ---------- storylines ---------- */
  .stories{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
  .stories .slabel{font-family:var(--mono); font-size:9.5px; letter-spacing:.8px; text-transform:uppercase; color:var(--faint); margin-right:2px}
  .schip{font-family:var(--sans); font-size:11px; color:var(--dim); background:#0d1712;
    border:1px solid var(--edge); border-radius:20px; padding:4px 11px; cursor:pointer;
    transition:color .15s,border-color .15s,background .15s; white-space:nowrap}
  .schip:hover{color:var(--ink); border-color:var(--faint)}
  .schip.on{color:var(--ground); background:var(--l-fern); border-color:var(--l-fern); font-weight:600}
  .schip.clear{border-style:dashed}

  /* ---------- storyline highlight overlay ---------- */
  .stage.storying .node:not(.hl){opacity:.2}
  .stage.storying .link{stroke-opacity:.06}
  .node.hl circle.dot{stroke:#fff; stroke-width:2.4px; transform:scale(1.5)}
  .node.hl .halo{opacity:.5; animation:pulse 1.8s ease-in-out infinite}
  .node.hl text{fill:#fff; font-size:14px}
  .node.selected circle.dot{stroke:#fff; stroke-width:3px}
  .node.selected .halo{opacity:.26}

  @media (max-width:680px){
    header.bar{padding:10px 14px; gap:9px}
    .brand{flex-basis:100%; min-width:0}
    .brand h1{font-size:16px; line-height:1.2; white-space:normal; overflow-wrap:break-word}
    .brand p{display:none}
    .spacer{display:none}
    .controls{width:100%; gap:6px}
    .search{flex:1 1 100%} .search input{width:100%}
    .legend{gap:9px 14px; padding:8px 14px; flex-wrap:nowrap; overflow-x:auto;
      white-space:nowrap; -webkit-overflow-scrolling:touch}
    .legend .lg{flex:0 0 auto} .legend .note,.legend .sep{display:none}
    footer.meta{gap:14px; flex-wrap:nowrap; overflow-x:auto; white-space:nowrap}
    footer.meta>span{flex:0 0 auto}
    .zoomctl{right:12px; bottom:12px}
    .panel{top:auto; bottom:0; left:0; right:auto; width:100vw; max-width:100vw; max-height:62%;
      overflow-x:hidden;
      border:1px solid var(--edge); border-top:3px solid var(--l-root); border-radius:14px 14px 0 0;
      transform:translateY(18px)}
    .panel.open{transform:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important; animation:none !important}
  }
</style>

<header class="bar">
  <div class="brand">
    <h1>The Plant Kingdom &middot; <em>a living tree</em></h1>
    <p>Every family of land plant, from mosses to orchids &middot; sized by species richness, coloured by lineage</p>
  </div>
  <div class="spacer"></div>
  <div class="controls">
    <div class="search">
      <input id="q" type="search" placeholder="Find a family or plant&hellip;" autocomplete="off" spellcheck="false" aria-label="Search families">
      <span class="hint" id="qhint"></span>
    </div>
    <span class="seg" id="viewseg">
      <button class="ctl on" id="btnTree">Tree</button>
      <button class="ctl" id="btnRadial">Radial</button>
    </span>
    <button class="ctl on" id="btnOrders">Orders</button>
    <button class="ctl" id="btnExpand">Expand all</button>
    <button class="ctl" id="btnCollapse">Collapse</button>
    <button class="ctl" id="btnFit">Fit</button>
  </div>
</header>

<div class="legend" id="legend"></div>

<main class="stage" id="stage">
  <svg id="svg"><g id="viewport"><g id="links"></g><g id="nodes"></g></g></svg>
  <div class="tip" id="tip"></div>
  <aside class="panel" id="panel" role="dialog" aria-label="Taxon detail" aria-hidden="true">
    <button class="pclose" id="pclose" aria-label="Close">&times;</button>
    <div id="pdetail">
      <nav class="pcrumb" id="pcrumb"></nav>
      <span class="prank" id="prank"></span>
      <h2 class="pname" id="pname"></h2>
      <div class="pcommon" id="pcommon"></div>
      <p class="pblurb" id="pblurb"></p>
      <div id="pexwrap"></div>
      <div class="pstats" id="pstats"></div>
      <div class="pactions" id="pactions"></div>
    </div>
    <div id="plist" hidden></div>
  </aside>
  <div class="zoomctl">
    <button class="ctl" id="zin" aria-label="Zoom in">+</button>
    <button class="ctl" id="zout" aria-label="Zoom out">&minus;</button>
  </div>
</main>

<footer class="meta" id="footer"></footer>

<script>
const DATA = /*__DATA__*/;

// ---------- lineage assignment ----------
const LINEAGES = {
  bryo:{c:'--l-bryo', label:'Bryophytes'},
  fern:{c:'--l-fern', label:'Ferns & allies'},
  gymno:{c:'--l-gymno', label:'Gymnosperms'},
  basal:{c:'--l-basal', label:'Magnoliids & basal'},
  mono:{c:'--l-mono', label:'Monocots'},
  rosid:{c:'--l-rosid', label:'Rosids'},
  asterid:{c:'--l-asterid', label:'Asterids'},
  eudicot:{c:'--l-eudicot', label:'Other eudicots'},
  root:{c:'--l-root', label:'Trunk'}
};
const ANCHORS = {
  'Bryophytes':'bryo','Lycopodiopsida':'fern','Polypodiopsida':'fern','Gymnosperms':'gymno',
  'Basal angiosperms':'basal','Magnoliids':'basal','Chloranthales':'basal','Monocots':'mono',
  'Ceratophyllales':'eudicot','Eudicots':'eudicot','Superrosids':'rosid','Asterids':'asterid'
};

// ---------- preprocess ----------
let UID=0, MAXAGG=1;
function prep(n, depth, lineage, parent){
  n._id=UID++; n.depth=depth; n.parent=parent;
  n.lineage = ANCHORS[n.name] || lineage;
  const kids=n.children||[];
  let famCount=0, agg=0;
  if(kids.length===0){ agg=n.speciesCount||1; famCount=(n.rank==='family')?1:0; }
  for(const k of kids){ prep(k, depth+1, n.lineage, n); agg+=k.agg; famCount+=k.famCount; }
  n.agg=agg; n.famCount=famCount;
  // default open: everything internal EXCEPT orders (orders collapse to hide families)
  n.open = kids.length>0 && n.rank!=='order';
  if(agg>MAXAGG) MAXAGG=agg;
  return n;
}
const ROOT = prep(DATA.tree, 0, 'root', null);
const K = 26/Math.sqrt(MAXAGG);
function radius(n){ return Math.min(26, 2.4 + K*Math.sqrt(n.agg)); }
const cssVar = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
function color(n){ return cssVar(LINEAGES[n.lineage].c); }

// ---------- layout (horizontal tidy tree / radial) ----------
const DX=212, DY=28, RING=140;
let mode='tree';
let leafCursor=0, leafTotal=0;
let visibleNodes=[];
function layout(){
  const nodes=[], links=[];
  if(mode==='radial'){
    // cluster layout: all frontier leaves on one outer ring (handles our very unbalanced depth)
    leafTotal=0; let maxD=1;
    (function c(n){ const k=n.open?(n.children||[]):[]; if(!k.length){ leafTotal++; if(n.depth>maxD) maxD=n.depth; } else k.forEach(c); })(ROOT);
    const OUTER=560, ringStep=OUTER/maxD;
    leafCursor=0;
    const span=Math.PI*2*0.94, start=-Math.PI/2 + Math.PI*2*0.03;
    (function walk(n){
      const kids = n.open ? (n.children||[]) : [];
      let rad;
      if(kids.length===0){ n.pa = start + (leafCursor+0.5)/leafTotal*span; leafCursor++; rad=OUTER; }
      else{ kids.forEach(walk); n.pa = (kids[0].pa + kids[kids.length-1].pa)/2; rad=n.depth*ringStep; }
      n.x = rad*Math.cos(n.pa); n.y = rad*Math.sin(n.pa);
      nodes.push(n);
      for(const k of kids) links.push({s:n, t:k});
    })(ROOT);
  } else {
    leafCursor=0;
    (function walk(n){
      n.x = n.depth*DX;
      const kids = n.open ? (n.children||[]) : [];
      if(kids.length===0){ n.y = leafCursor*DY; leafCursor++; }
      else{ kids.forEach(walk); n.y = (kids[0].y + kids[kids.length-1].y)/2; }
      nodes.push(n);
      for(const k of kids) links.push({s:n, t:k});
    })(ROOT);
  }
  return {nodes, links};
}

// ---------- render ----------
const svg=document.getElementById('svg');
const gLinks=document.getElementById('links');
const gNodes=document.getElementById('nodes');
const NS='http://www.w3.org/2000/svg';
const nodeEls=new Map(), linkEls=new Map();

function linkPath(s,t){
  const x1=s.x, y1=s.y, x2=t.x, y2=t.y, mx=(x1+x2)/2;
  return `M${x1},${y1}C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
}
function linkPathRadial(s,t){
  const r1=Math.hypot(s.x,s.y), r2=Math.hypot(t.x,t.y);
  const a1=Math.atan2(s.y,s.x), a2=Math.atan2(t.y,t.x), mr=(r1+r2)/2;
  return `M${s.x},${s.y}C${mr*Math.cos(a1)},${mr*Math.sin(a1)} ${mr*Math.cos(a2)},${mr*Math.sin(a2)} ${t.x},${t.y}`;
}
function render(){
  const {nodes, links}=layout();
  visibleNodes = nodes.slice().sort((a,b)=> mode==='radial' ? (a.pa-b.pa) : (a.y-b.y));
  const seenN=new Set(), seenL=new Set();

  // links
  for(const l of links){
    const id=l.s._id+'-'+l.t._id; seenL.add(id);
    let el=linkEls.get(id);
    if(!el){ el=document.createElementNS(NS,'path'); el.setAttribute('class','link');
      el.style.setProperty('--lc', color(l.t)); gLinks.appendChild(el); linkEls.set(id,el); }
    el.setAttribute('d', mode==='radial' ? linkPathRadial(l.s,l.t) : linkPath(l.s,l.t));
  }
  // nodes
  for(const n of nodes){
    seenN.add(n._id);
    let el=nodeEls.get(n._id);
    if(!el){
      el=document.createElementNS(NS,'g'); el.setAttribute('class','node');
      el.style.setProperty('--lc', color(n));
      const halo=document.createElementNS(NS,'circle'); halo.setAttribute('class','halo'); halo.setAttribute('r', radius(n)+9);
      const dot=document.createElementNS(NS,'circle'); dot.setAttribute('class','dot'); dot.setAttribute('r', radius(n));
      const tog=document.createElementNS(NS,'text'); tog.setAttribute('class','toggle');
      const txt=document.createElementNS(NS,'text');
      el.append(halo,dot,tog,txt);
      el.addEventListener('click', e=>{ e.stopPropagation(); toggle(n); select(n,{center:false}); });
      el.addEventListener('mouseenter', e=>{ hoverOn(n); showTip(n,e); });
      el.addEventListener('mousemove', e=> moveTip(e));
      el.addEventListener('mouseleave', ()=>{ hoverOff(); hideTip(); });
      gNodes.appendChild(el); nodeEls.set(n._id, el);
      labelNode(el, n);
    }
    const hasKids=(n.children||[]).length>0;
    el.classList.toggle('branch', hasKids && !n.open);
    el.classList.toggle('open', hasKids && n.open);
    const tog=el.querySelector('.toggle');
    tog.textContent = hasKids ? (n.open?'':'+') : '';
    el.setAttribute('transform',`translate(${n.x},${n.y})`);
    if(mode==='radial') labelNode(el,n);   // rotation depends on angle, which changes each layout
  }
  // remove stale
  for(const [id,el] of nodeEls){ if(!seenN.has(id)){ el.remove(); nodeEls.delete(id);} }
  for(const [id,el] of linkEls){ if(!seenL.has(id)){ el.remove(); linkEls.delete(id);} }
}

function labelNode(el, n){
  const txt=el.querySelector('text:not(.toggle)');
  while(txt.firstChild) txt.removeChild(txt.firstChild);
  const hasKids=(n.children||[]).length>0;
  const r=radius(n);
  const visLeaf = !(n.open && (n.children||[]).length);   // frontier node (nothing expanded below)

  if(mode==='radial'){
    txt.removeAttribute('y');
    if(!visLeaf){ txt.removeAttribute('transform'); return; }   // interior clades stay unlabelled (kept clean)
    let deg=n.pa*180/Math.PI;
    const flip = deg>90 || deg<-90;
    txt.setAttribute('transform', `rotate(${flip?deg+180:deg})`);
    txt.setAttribute('text-anchor', flip?'end':'start');
    const t1=document.createElementNS(NS,'tspan'); t1.textContent=n.name;
    t1.setAttribute('x', flip? -(r+6) : (r+6)); t1.setAttribute('dy','0.32em');
    txt.appendChild(t1);
    return;
  }

  // tree mode
  txt.removeAttribute('transform');
  const left = hasKids && n.open;                 // expanded internal -> label on left
  txt.setAttribute('text-anchor', left?'end':'start');
  txt.setAttribute('x', left? -(r+7) : (r+7));
  const isLeaf=!hasKids;
  const t1=document.createElementNS(NS,'tspan'); t1.textContent=n.name; txt.appendChild(t1);
  if(isLeaf){
    txt.setAttribute('y',0);
    t1.setAttribute('x', r+7); t1.setAttribute('dy', n.common?'-0.38em':'0');
    if(n.common){ const c=document.createElementNS(NS,'tspan'); c.setAttribute('class','common');
      c.setAttribute('x', r+7); c.setAttribute('dy','1.2em'); c.textContent=n.common; txt.appendChild(c); }
  }
}

// ---------- pan / zoom ----------
const vp=document.getElementById('viewport');
let T={x:60,y:0,k:1};
function applyT(){ vp.setAttribute('transform',`translate(${T.x},${T.y}) scale(${T.k})`); }
function fit(dur){
  const {nodes}=layout();
  const pl = mode==='radial'?160:40, pr = mode==='radial'?160:180, pv = mode==='radial'?160:20;
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const n of nodes){ x0=Math.min(x0,n.x-pl); x1=Math.max(x1,n.x+pr); y0=Math.min(y0,n.y-pv); y1=Math.max(y1,n.y+pv); }
  const r=stage.getBoundingClientRect();
  const k=Math.min(r.width/(x1-x0), r.height/(y1-y0), 1.1)*0.96;
  const tx=(r.width-(x1-x0)*k)/2 - x0*k, ty=(r.height-(y1-y0)*k)/2 - y0*k;
  animateT({x:tx,y:ty,k}, dur||0);
}
function animateT(target,dur){
  if(!dur || matchMedia('(prefers-reduced-motion:reduce)').matches){ T=target; applyT(); return; }
  const s={...T}, t0=performance.now();
  (function step(now){ let p=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-p,3);
    T={x:s.x+(target.x-s.x)*e, y:s.y+(target.y-s.y)*e, k:s.k+(target.k-s.k)*e}; applyT();
    if(p<1) requestAnimationFrame(step); })(t0);
}
// pan (1 pointer) + pinch-zoom (2 pointers)
const pointers=new Map(); let pan=null, pinch=null, panDragged=false;
stage.addEventListener('pointerdown', e=>{
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){ startPinch(); pan=null; stage.classList.remove('grabbing'); }
  else if(!e.target.closest('.node')){ pan={x:e.clientX,y:e.clientY,tx:T.x,ty:T.y}; panDragged=false; stage.classList.add('grabbing'); }
  stage.setPointerCapture(e.pointerId);
});
stage.addEventListener('pointermove', e=>{
  if(pointers.has(e.pointerId)) pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pinch && pointers.size>=2){ doPinch(); return; }
  if(pan){ if(Math.abs(e.clientX-pan.x)+Math.abs(e.clientY-pan.y)>4) panDragged=true;
    T.x=pan.tx+(e.clientX-pan.x); T.y=pan.ty+(e.clientY-pan.y); applyT(); }
});
// click on empty background closes the panel (but not right after a drag)
stage.addEventListener('click', e=>{
  if(e.target.closest('.node')||e.target.closest('.panel')||e.target.closest('.zoomctl')) return;
  if(!panDragged) closePanel();
});
function endPtr(e){ pointers.delete(e.pointerId); if(pointers.size<2) pinch=null;
  if(pointers.size===0){ pan=null; stage.classList.remove('grabbing'); } }
stage.addEventListener('pointerup', endPtr);
stage.addEventListener('pointercancel', endPtr);
function two(){ return [...pointers.values()].slice(0,2); }
function startPinch(){ const [a,b]=two(); const r=stage.getBoundingClientRect();
  pinch={d:Math.hypot(a.x-b.x,a.y-b.y), mx:(a.x+b.x)/2-r.left, my:(a.y+b.y)/2-r.top, k:T.k, tx:T.x, ty:T.y}; }
function doPinch(){ const [a,b]=two(); const r=stage.getBoundingClientRect();
  const d=Math.hypot(a.x-b.x,a.y-b.y); const mx=(a.x+b.x)/2-r.left, my=(a.y+b.y)/2-r.top;
  const k=Math.max(0.12,Math.min(3.2, pinch.k*d/pinch.d));
  T.k=k; T.x=mx-(pinch.mx-pinch.tx)*(k/pinch.k); T.y=my-(pinch.my-pinch.ty)*(k/pinch.k); applyT(); }

// ---------- buttons + boot ----------
document.getElementById('btnOrders').onclick=toOrders;
document.getElementById('btnExpand').onclick=expandAll;
document.getElementById('btnCollapse').onclick=collapseTop;
document.getElementById('btnFit').onclick=()=>fit(500);
document.getElementById('btnTree').onclick=()=>switchMode('tree');
document.getElementById('btnRadial').onclick=()=>switchMode('radial');
q.addEventListener('keydown',e=>{ if(e.key==='Escape'){ q.value=''; q.dispatchEvent(new Event('input')); q.blur(); } });

render(); applyT(); fit(0);
applyHash();
window.addEventListener('resize', ()=>{ if(!selected && !activeStory) fit(0); });
</script>
